<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- ぱんだ (Panda) -->
  <circle cx="100" cy="100" r="95" fill="#98FB98"/>
  <!-- Ears -->
  <circle cx="50" cy="48" r="20" fill="#333"/>
  <circle cx="150" cy="48" r="20" fill="#333"/>
  <!-- Face -->
  <circle cx="100" cy="108" r="60" fill="#FAFAFA"/>
  <!-- Eye patches -->
  <ellipse cx="72" cy="95" rx="18" ry="16" fill="#333" transform="rotate(-10,72,95)"/>
  <ellipse cx="128" cy="95" rx="18" ry="16" fill="#333" transform="rotate(10,128,95)"/>
  <!-- Eyes -->
  <circle cx="72" cy="95" r="8" fill="#FFF"/>
  <circle cx="128" cy="95" r="8" fill="#FFF"/>
  <circle cx="74" cy="93" r="4" fill="#333"/>
  <circle cx="130" cy="93" r="4" fill="#333"/>
  <circle cx="76" cy="91" r="2" fill="#FFF"/>
  <circle cx="132" cy="91" r="2" fill="#FFF"/>
  <!-- Nose -->
  <ellipse cx="100" cy="115" rx="6" ry="4" fill="#333"/>
  <!-- Mouth -->
  <path d="M92,122 Q100,130 108,122" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="58" cy="115" r="7" fill="#FF9999" opacity="0.3"/>
  <circle cx="142" cy="115" r="7" fill="#FF9999" opacity="0.3"/>
</svg>
