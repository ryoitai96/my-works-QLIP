<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- きつね (Fox) -->
  <circle cx="100" cy="100" r="95" fill="#FFA07A"/>
  <!-- Ears -->
  <polygon points="45,58 25,10 78,48" fill="#FF8C00"/>
  <polygon points="155,58 175,10 122,48" fill="#FF8C00"/>
  <polygon points="50,55 35,22 72,48" fill="#FFF8DC"/>
  <polygon points="150,55 165,22 128,48" fill="#FFF8DC"/>
  <!-- Face -->
  <circle cx="100" cy="108" r="58" fill="#FFE4B5"/>
  <!-- Eyes -->
  <ellipse cx="76" cy="95" rx="8" ry="10" fill="#333"/>
  <ellipse cx="124" cy="95" rx="8" ry="10" fill="#333"/>
  <circle cx="79" cy="91" r="3.5" fill="#FFF"/>
  <circle cx="127" cy="91" r="3.5" fill="#FFF"/>
  <!-- Nose -->
  <ellipse cx="100" cy="114" rx="5" ry="3.5" fill="#333"/>
  <!-- Mouth -->
  <path d="M92,120 Q100,128 108,120" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheek marks -->
  <circle cx="58" cy="112" r="8" fill="#FF8C00" opacity="0.3"/>
  <circle cx="142" cy="112" r="8" fill="#FF8C00" opacity="0.3"/>
</svg>
