<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- ねこ (Cat) -->
  <circle cx="100" cy="100" r="95" fill="#FFB6C1"/>
  <!-- Ears -->
  <polygon points="45,55 30,10 75,45" fill="#FF69B4"/>
  <polygon points="155,55 170,10 125,45" fill="#FF69B4"/>
  <polygon points="50,50 38,20 70,45" fill="#FFB6C1"/>
  <polygon points="150,50 162,20 130,45" fill="#FFB6C1"/>
  <!-- Face -->
  <circle cx="100" cy="105" r="60" fill="#FFF0F5"/>
  <!-- Eyes -->
  <ellipse cx="75" cy="95" rx="10" ry="12" fill="#333"/>
  <ellipse cx="125" cy="95" rx="10" ry="12" fill="#333"/>
  <circle cx="79" cy="90" r="4" fill="#FFF"/>
  <circle cx="129" cy="90" r="4" fill="#FFF"/>
  <!-- Nose -->
  <ellipse cx="100" cy="112" rx="5" ry="3" fill="#FF69B4"/>
  <!-- Mouth -->
  <path d="M90,118 Q100,128 110,118" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="40" y1="105" x2="70" y2="108" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="115" x2="70" y2="115" stroke="#333" stroke-width="1.5"/>
  <line x1="130" y1="108" x2="160" y2="105" stroke="#333" stroke-width="1.5"/>
  <line x1="130" y1="115" x2="160" y2="115" stroke="#333" stroke-width="1.5"/>
  <!-- Blush -->
  <circle cx="65" cy="118" r="8" fill="#FF69B4" opacity="0.3"/>
  <circle cx="135" cy="118" r="8" fill="#FF69B4" opacity="0.3"/>
</svg>
