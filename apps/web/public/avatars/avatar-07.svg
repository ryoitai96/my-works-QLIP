<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- ぺんぎん (Penguin) -->
  <circle cx="100" cy="100" r="95" fill="#ADD8E6"/>
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="55" ry="60" fill="#2F4F4F"/>
  <!-- Belly -->
  <ellipse cx="100" cy="118" rx="35" ry="42" fill="#FAFAFA"/>
  <!-- Eyes -->
  <circle cx="78" cy="90" r="10" fill="#FFF"/>
  <circle cx="122" cy="90" r="10" fill="#FFF"/>
  <circle cx="80" cy="90" r="6" fill="#333"/>
  <circle cx="124" cy="90" r="6" fill="#333"/>
  <circle cx="82" cy="88" r="2.5" fill="#FFF"/>
  <circle cx="126" cy="88" r="2.5" fill="#FFF"/>
  <!-- Beak -->
  <polygon points="90,105 100,115 110,105" fill="#FF8C00"/>
  <!-- Feet -->
  <ellipse cx="80" cy="168" rx="12" ry="5" fill="#FF8C00"/>
  <ellipse cx="120" cy="168" rx="12" ry="5" fill="#FF8C00"/>
  <!-- Blush -->
  <circle cx="65" cy="105" r="7" fill="#FF9999" opacity="0.3"/>
  <circle cx="135" cy="105" r="7" fill="#FF9999" opacity="0.3"/>
</svg>
